name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux (Python 3.13)"
            os: ubuntu-latest
            python-version: "3.13"
          - name: "Linux (Python 3.14)"
            os: ubuntu-latest
            python-version: "3.14"
          - name: "macOS (Python 3.14)"
            os: macos-latest
            python-version: "3.14"
          - name: "Windows (Python 3.14)"
            os: windows-latest
            python-version: "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files

      - name: Run test suite with pytest and check coverage
        if: success() || failure()
        run: uv run pytest --benchmark-skip --junitxml=pytest.xml

      - name: Report test coverage to PR and Job Summary (Linux only)
        if: >-
          (success() || failure()) &&
          matrix.os == 'ubuntu-latest' &&
          matrix.python-version == '3.14'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          title: Coverage Report (Python 3.14)
          badge-title: Coverage
          hide-badge: false
          hide-report: false
          create-new-comment: false

      - name: Run benchmark tests (Linux only)
        if: >-
          (success() || failure()) &&
          matrix.os == 'ubuntu-latest' &&
          matrix.python-version == '3.14'
        run: uv run pytest --benchmark-only

      - name: Run type checks with ty (Linux only)
        if: (success() || failure()) && matrix.os == 'ubuntu-latest'
        run: uv run ty check --output-format github
