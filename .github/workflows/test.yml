name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files

      - name: Run test suite with pytest and check coverage
        if: success() || failure()
        run: uv run pytest --benchmark-skip

      - name: Run benchmark tests
        if: >-
          (success() || failure()) &&
          matrix.os == 'ubuntu-latest' &&
          matrix.python-version == '3.14'
        run: uv run pytest --benchmark-only

      - name: Run type checks with ty
        if: (success() || failure()) && matrix.os == 'ubuntu-latest'
        run: uv run ty check --output-format github
