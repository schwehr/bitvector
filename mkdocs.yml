site_name: BitVector
site_description: A memory-efficient packed representation for bit arrays in pure Python
site_url: https://github.com/schwehr/bitvector-modern
repo_url: https://github.com/schwehr/bitvector-modern
repo_name: schwehr/bitvector-modern

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

nav:
  - Home: index.md
  - API Reference: api.md
  - Development: development.md
