[project]
name = "bitvector-modern"
version = "3.5.0"
description = "A memory-efficient packed representation for bit arrays in pure Python"
readme = { file = "README", content-type = "text/plain" }
authors = [
    { name = "Avinash Kak", email = "kak@purdue.edu" },
]
maintainers = [
    { name = "Avinash Kak", email = "kak@purdue.edu" },
]
requires-python = ">=3.13"
keywords = ["bit array", "bit vector", "bit string", "logical operations on bit fields"]
license = { file = "LICENSE" }
classifiers = [
    "Topic :: Utilities",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = []

[project.urls]
Homepage = "https://engineering.purdue.edu/kak/dist/BitVector-3.5.0.html"
Download = "https://engineering.purdue.edu/kak/dist/BitVector-3.5.0.tar.gz"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["BitVector"]


[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true

[dependency-groups]
dev = [
    "pre-commit>=4.6.0",
    "pytest>=8.0.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.20",
    "ty>=0.0.56",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-p no:doctest --cov=BitVector --cov-report=term-missing --cov-report=xml"
pythonpath = ["."]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.coverage.run]
source = ["BitVector"]
branch = true

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
